<div class="dashboard-container">
  <header class="dashboard-header">
    <div class="header-content">
      <div class="header-title-section">
        <h1>SmartAPITester</h1>
        <p class="subtitle">Automated API Stress Testing Tool</p>
      </div>

      <nav class="tab-nav">
        <button
          [class.active]="activeTab() === 'request'"
          (click)="switchTab('request')"
          type="button"
        >
          <span class="btn-text">Configuration</span>
        </button>
        <button
          [class.active]="activeTab() === 'results'"
          (click)="switchTab('results')"
          type="button"
        >
          <span class="btn-text">Response Viewer</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="tab-content" *ngIf="activeTab() === 'request'">
      <app-config-panel></app-config-panel>
    </div>

    <div class="tab-content" *ngIf="activeTab() === 'results'">
  <div class="history-full-view">
    <section class="stats-dashboard">
      <app-request-monitor [minimal]="false"></app-request-monitor>
    </section>
    <section class="history-inspector">
      <app-response-viewer></app-response-viewer>
    </section>
  </div>
</div>
  </main>

  <div class="execution-overlay" *ngIf="showExecutionOverlay()">
  <div class="compact-modal">
    <div class="modal-header">
      <div class="brand-group">
        <div class="pulse-indicator" [class.running]="apiRunner.isTesting()"></div>
        <div class="title-meta">
          <h3>Test Execution</h3>
          <span class="status-label" [class.running]="apiRunner.isTesting()">
            {{ apiRunner.isTesting() ? 'In Progress' : 'Task Completed' }}
          </span>
        </div>
      </div>

      <button class="close-circle-btn" (click)="closeOverlay()">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="modal-content-grid">
      <section class="stats-preview">
        <app-request-monitor [minimal]="true"></app-request-monitor>
      </section>

      <section class="results-detailed-view">
        <app-response-viewer></app-response-viewer>
      </section>
    </div>
  </div>
</div>
</div>
